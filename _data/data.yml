career-profile:
  title: Summary
  summary: |
    Game programmer with AAA development experience at Ubisoft, credited on 3 shipped titles: Skull and Bones, Assassin's Creed Shadows and Assassin's Creed Black Flag Resynced, across PC, PlayStation 5 and Xbox Series X.
    Specialized in C++ UI programming, gameplay systems and engine integration using Ubisoft's Anvil engine.
    Background in real-time embedded systems strengthens expertise in memory optimization, performance-critical execution and cross-platform development.

education:
  title: Education
  info:
  - degree: BSc in Computer Science and Information Technology
    university: School of Electrical Engineering, University of Belgrade
    time: 2013 - 2017

experiences:
  title: Experience
  info:
  - role: Senior Programmer
    time: November 2024 - Present
    company: Ubisoft, Belgrade
    details: |
      - Owned development of Animus Hub, a cross-title in-game portal unifying progression tracking, content discovery, upsell, preorder, and cross-launch for the Assassin's Creed franchise, shipped across AC Shadows and Black Flag Resynced
      - Delivered 5 features end-to-end: boot flow, landing page with title roster and character visualization, per-title detail pages with adaptive content, video player and free weekend trial
      - Designed the communication layer between Ultralight, a GPU-accelerated web UI renderer embedded in Ubisoft's Anvil engine and the game runtime: heartbeat timers, event dispatch, data exchange and state synchronization
      - Implemented gameplay data pipelines to expose live game state to the UI layer, ensuring frame-budget-aware updates and minimal runtime overhead
      - Mentored and onboarded 3 engineers on Anvil engine workflows and codebase conventions
  - role: UI Programmer
    time: January 2021 - November 2024
    company: Ubisoft, Belgrade
    details: |
      - Developed the founding prototype of Animus Hub, establishing the initial system architecture and integration contracts that shaped its production
      - Owned development of the Report Player feature and Maintenance mode for Skull and Bones: a screen blocking game access during server downtime with a live countdown to server availability
      - Delivered cross-platform compatibility across PC, PlayStation 5 and Xbox Series X, including certification-compliant development for Google Stadia
      - Implemented UI component logic in C++ within Ubisoft's Anvil engine, transforming gameplay state into compact, renderable data structures optimized for real-time frame execution
      - Designed data contracts and integration workflows with art teams to streamline the UI content pipeline and reduce iteration overhead
  - role: Automotive Embedded Software Engineer
    time: October 2017 - December 2020
    company: RT-RK, Belgrade
    details: |
      - Built a CNN model conversion tool in Python to translate trained models into resource-efficient runtime interpreters for constrained embedded hardware (TI TDA2p ADAS SoC)
      - Developed a memory and execution scheduler in C for the CNN runtime interpreter, managing layer-by-layer execution order and buffer allocation on constrained hardware
      - Built video capture, storage and playback pipelines on Linux using a PCIe switch and ROS2 for generating computer vision training datasets
      - Applied performance optimization and memory management techniques to meet hard real-time processing deadlines
  - role: Intern
    time: February 2017 - September 2017
    company: RT-RK, Belgrade
    details: |
      - Optimized computer vision algorithms for embedded real-time execution on TI TDA2x ADAS SoC using DMA transfers and double-buffering
      - Reduced integral image execution time from 23ms to 16ms per 720p frame through algorithmic and memory access pattern improvements

